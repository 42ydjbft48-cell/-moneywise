<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

<meta name="robots" content="noindex,nofollow,noarchive">
<title>MoneyWise</title>
<style>
:root{--bg:#f5f1e8;--card:#fffdf8;--ink:#152231;--muted:#74808b;--line:#e5e0d6;--nav:#101d2b;--teal:#2eb7a3;--blue:#42a7d5;--lime:#d4df62;--orange:#ef944e;--red:#df6268;--shadow:0 12px 32px rgba(20,35,50,.10);--safe:env(safe-area-inset-bottom,0px)}
*{box-sizing:border-box}html,body{margin:0;min-height:100%;background:var(--bg);color:var(--ink);font-family:-apple-system,BlinkMacSystemFont,"SF Pro Text",Arial,sans-serif;-webkit-font-smoothing:antialiased}button,input,select,textarea{font:inherit}button{cursor:pointer}.app{max-width:720px;margin:auto;padding:calc(18px + env(safe-area-inset-top,0px)) 16px calc(100px + var(--safe))}.top{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}.brand{display:flex;align-items:center;gap:10px;font-size:21px;font-weight:800}.logo{width:36px;height:36px;border-radius:12px;background:linear-gradient(145deg,var(--blue),var(--teal) 55%,var(--lime));position:relative;box-shadow:0 8px 20px rgba(46,183,163,.25)}.logo:before,.logo:after{content:"";position:absolute;width:13px;height:7px;border-radius:3px;background:white}.logo:before{left:8px;top:9px;transform:rotate(28deg)}.logo:after{right:7px;bottom:9px;transform:rotate(-28deg)}.circleBtn{border:1px solid var(--line);background:var(--card);width:42px;height:42px;border-radius:14px;box-shadow:var(--shadow);font-size:20px}.eyebrow{text-transform:uppercase;letter-spacing:.10em;font-size:11px;font-weight:800;color:var(--muted)}h1{font-size:29px;letter-spacing:-.04em;margin:5px 0 16px}.hero{background:linear-gradient(145deg,#10283b,#17475a 55%,#1d7069);color:white;border-radius:28px;padding:22px;box-shadow:0 20px 48px rgba(16,29,43,.22);overflow:hidden;position:relative}.hero:after{content:"";position:absolute;width:180px;height:180px;border:28px solid rgba(212,223,98,.18);border-radius:50%;right:-90px;bottom:-110px}.heroLabel{font-size:12px;text-transform:uppercase;letter-spacing:.10em;opacity:.72;font-weight:800}.heroAmount{font-size:52px;line-height:1;font-weight:850;letter-spacing:-.06em;margin:7px 0}.heroText{font-size:13px;opacity:.75;max-width:270px}.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:20px;position:relative;z-index:2}.stat{background:rgba(255,255,255,.09);border:1px solid rgba(255,255,255,.08);padding:11px 9px;border-radius:14px}.stat span{display:block;font-size:9px;text-transform:uppercase;letter-spacing:.08em;opacity:.64;font-weight:800}.stat strong{display:block;font-size:14px;margin-top:4px}.section{margin-top:22px}.sectionHead{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}.sectionHead h2{font-size:17px;margin:0}.linkBtn{border:0;background:none;color:#168c7e;font-weight:800;padding:5px}.card{background:var(--card);border:1px solid var(--line);border-radius:21px;box-shadow:var(--shadow);overflow:hidden}.pad{padding:16px}.quick{display:grid;grid-template-columns:1fr 1fr;gap:10px}.quick button{border:1px solid var(--line);background:var(--card);border-radius:20px;padding:16px;text-align:left;min-height:110px;box-shadow:var(--shadow)}.quick b{display:block;font-size:15px;margin-top:14px}.quick small{color:var(--muted)}.qicon{width:38px;height:38px;border-radius:13px;display:grid;place-items:center;font-size:19px;background:#e7f7f4;color:#168c7e}.row{display:grid;grid-template-columns:43px 1fr auto;gap:11px;align-items:center;padding:13px 15px}.row+.row{border-top:1px solid var(--line)}.avatar{width:43px;height:43px;border-radius:14px;display:grid;place-items:center;color:white;font-weight:850;background:linear-gradient(145deg,var(--blue),var(--teal))}.main{min-width:0}.main b{display:block;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14px}.main small{display:block;color:var(--muted);font-size:11px;margin-top:3px}.amount{text-align:right;font-weight:800;font-size:14px}.income{color:#20a070}.pill{display:inline-block;margin-top:4px;font-size:9px;border-radius:99px;padding:3px 7px;background:#edf7f5;color:#168c7e}.barRow{padding:14px 16px}.barTop{display:flex;justify-content:space-between;gap:10px;font-size:13px}.bar{height:7px;border-radius:99px;background:#ece8de;overflow:hidden;margin-top:8px}.bar i{display:block;height:100%;border-radius:99px;background:linear-gradient(90deg,var(--blue),var(--teal));width:0}.empty{text-align:center;color:var(--muted);padding:28px 18px}.nav{position:fixed;bottom:calc(10px + var(--safe));left:50%;transform:translateX(-50%);width:min(calc(100% - 24px),696px);height:70px;border-radius:24px;background:rgba(16,29,43,.96);display:grid;grid-template-columns:repeat(5,1fr);padding:7px;z-index:50;box-shadow:0 18px 45px rgba(10,18,28,.28)}.nav button{border:0;background:none;color:rgba(255,255,255,.52);border-radius:17px;font-size:10px;font-weight:800;display:grid;place-items:center;align-content:center;gap:4px}.nav button.active{color:white;background:rgba(255,255,255,.09)}.nav .ico{font-size:20px}.fab{position:fixed;right:max(22px,calc((100vw - 720px)/2 + 22px));bottom:calc(93px + var(--safe));width:54px;height:54px;border:0;border-radius:18px;background:var(--teal);color:white;font-size:28px;box-shadow:0 14px 30px rgba(46,183,163,.34);z-index:40}.toolbar{display:flex;gap:8px;margin-bottom:12px}.search{flex:1;border:1px solid var(--line);background:var(--card);border-radius:14px;padding:11px 13px;color:var(--ink)}.chip{border:1px solid var(--line);background:var(--card);border-radius:999px;padding:8px 12px;font-size:12px;font-weight:750}.chip.active{background:var(--nav);color:white;border-color:var(--nav)}.chips{display:flex;gap:7px;overflow:auto;padding-bottom:8px}.formCard{background:var(--card);border:1px solid var(--line);border-radius:20px;padding:15px;margin-bottom:12px;box-shadow:var(--shadow)}label{display:block;font-size:11px;text-transform:uppercase;letter-spacing:.07em;color:var(--muted);font-weight:800;margin-bottom:6px}.field{width:100%;border:1px solid var(--line);background:white;border-radius:13px;padding:12px;color:var(--ink)}.fieldRow{display:grid;grid-template-columns:1fr 1fr;gap:9px}.formGroup{margin-bottom:12px}.btn{border:0;border-radius:14px;padding:12px 15px;font-weight:800}.primary{background:var(--teal);color:white}.secondary{background:#eef1ef;color:var(--ink)}.danger{background:#fff0f0;color:var(--red)}.full{width:100%}.actions{display:flex;gap:9px}.actions .btn{flex:1}.itemCard{background:var(--card);border:1px solid var(--line);border-radius:18px;padding:14px;margin-bottom:10px;box-shadow:var(--shadow)}.itemTop{display:flex;justify-content:space-between;gap:10px}.itemTop h3{font-size:15px;margin:0}.itemTop b{font-size:14px}.itemMeta{color:var(--muted);font-size:12px;margin-top:4px}.itemBtns{display:flex;gap:7px;margin-top:12px}.miniBtn{border:1px solid var(--line);background:white;border-radius:11px;padding:8px 10px;font-size:12px;font-weight:750}.notice{border-radius:16px;background:#eef8f6;color:#176f65;padding:13px;font-size:12px;line-height:1.45;margin-bottom:12px}.modal{position:fixed;inset:0;background:rgba(4,10,16,.52);z-index:100;display:none;align-items:flex-end;justify-content:center}.modal.show{display:flex}.sheet{width:min(100%,720px);max-height:92vh;overflow:auto;background:var(--bg);border-radius:28px 28px 0 0;padding:20px 16px calc(22px + var(--safe));box-shadow:0 -20px 50px rgba(0,0,0,.18)}.grab{width:44px;height:5px;border-radius:99px;background:#c9c5bd;margin:0 auto 15px}.sheet h2{margin:0 0 16px;font-size:23px}.smallText{font-size:12px;color:var(--muted);line-height:1.45}.hidden{display:none!important}.toggleRow{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--line)}.toggleRow:last-child{border:0}.dangerZone{border:1px solid #f1c9cb;background:#fff6f6;border-radius:18px;padding:14px;margin-top:14px}.moneyInput{font-size:20px;font-weight:800}.toast{position:fixed;left:50%;bottom:calc(92px + var(--safe));transform:translate(-50%,20px);background:var(--nav);color:white;padding:11px 15px;border-radius:12px;opacity:0;pointer-events:none;transition:.2s;z-index:200;font-size:13px}.toast.show{opacity:1;transform:translate(-50%,0)}
@media(max-width:380px){.heroAmount{font-size:46px}.stats{grid-template-columns:1fr}.quick{grid-template-columns:1fr 1fr}.app{padding-left:12px;padding-right:12px}}
</style>
</head>
<body>
<div class="app" id="app"></div>
<button class="fab" id="fab" aria-label="Add">+</button>
<nav class="nav" id="nav"></nav>
<div class="modal" id="modal"><div class="sheet"><div class="grab"></div><div id="modalBody"></div></div></div>
<div class="toast" id="toast"></div>
<script>
(function(){
'use strict';
var KEY='moneywise.personal.v2';
var route='home';
var state=load();
var app=document.getElementById('app'),nav=document.getElementById('nav'),modal=document.getElementById('modal'),modalBody=document.getElementById('modalBody'),toastEl=document.getElementById('toast'),fab=document.getElementById('fab');
function id(){return 'm'+Date.now().toString(36)+Math.random().toString(36).slice(2,7)}
function iso(){return new Date().toISOString().slice(0,10)}
function monthStart(){var d=new Date();return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-01'}
function monthEnd(){var d=new Date(d=new Date().getFullYear(),new Date().getMonth()+1,0);return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
function starter(){return {income:0,start:monthStart(),end:monthEnd(),accounts:[],bills:[],categories:[{id:id(),name:'Housing',bucket:'Needs',budget:0},{id:id(),name:'Food & Dining',bucket:'Needs',budget:0},{id:id(),name:'Transportation',bucket:'Needs',budget:0},{id:id(),name:'Utilities',bucket:'Needs',budget:0},{id:id(),name:'Shopping',bucket:'Wants',budget:0},{id:id(),name:'Entertainment',bucket:'Wants',budget:0},{id:id(),name:'Debt Payments',bucket:'Savings',budget:0},{id:id(),name:'Savings',bucket:'Savings',budget:0},{id:id(),name:'Other',bucket:'Wants',budget:0}],transactions:[],goals:[],version:2}}
function load(){try{var x=localStorage.getItem(KEY);return x?JSON.parse(x):starter()}catch(e){return starter()}}
function save(){try{localStorage.setItem(KEY,JSON.stringify(state));toast('Saved')}catch(e){toast('Could not save on this viewer')}}
function esc(s){return String(s==null?'':s).replace(/[&<>"']/g,function(c){return {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]})}
function money(n){return new Intl.NumberFormat('en-US',{style:'currency',currency:'USD',maximumFractionDigits:2}).format(Number(n)||0)}
function inPeriod(t){return t.date>=state.start&&t.date<=state.end}
function expenses(){return state.transactions.filter(function(t){return t.type==='expense'&&inPeriod(t)}).reduce(function(a,t){return a+Number(t.amount||0)},0)}
function incomeTx(){return state.transactions.filter(function(t){return t.type==='income'&&inPeriod(t)}).reduce(function(a,t){return a+Number(t.amount||0)},0)}
function unpaidBills(){return state.bills.filter(function(b){return !b.paid&&b.due>=state.start&&b.due<=state.end}).reduce(function(a,b){return a+Number(b.amount||0)},0)}
function plannedIncome(){return Number(state.income||0)+incomeTx()}
function safe(){return plannedIncome()-expenses()-unpaidBills()}
function bucketSpent(bucket){return state.transactions.filter(function(t){return t.type==='expense'&&inPeriod(t)&&t.bucket===bucket}).reduce(function(a,t){return a+Number(t.amount||0)},0)}
function categorySpent(name){return state.transactions.filter(function(t){return t.type==='expense'&&inPeriod(t)&&t.category===name}).reduce(function(a,t){return a+Number(t.amount||0)},0)}
function initials(s){var p=String(s||'?').trim().split(/\s+/);return (p[0][0]||'?')+(p.length>1?(p[p.length-1][0]||''):'')}
function pct(a,b){return b>0?Math.min(100,Math.round(a/b*100)):0}
function toast(msg){toastEl.textContent=msg;toastEl.className='toast show';clearTimeout(toastEl._t);toastEl._t=setTimeout(function(){toastEl.className='toast'},1800)}
function top(title,sub){return '<div class="top"><div class="brand"><span class="logo"></span>MoneyWise</div><button class="circleBtn" onclick="MW.openSettings()">⚙</button></div><div class="eyebrow">'+esc(sub||'Personal budget')+'</div><h1>'+esc(title)+'</h1>'}
function renderNav(){var items=[['home','⌂','Home'],['transactions','≡','Activity'],['plan','◫','Plan'],['goals','◎','Goals'],['settings','⚙','Settings']];nav.innerHTML=items.map(function(x){return '<button class="'+(route===x[0]?'active':'')+'" onclick="MW.go(\''+x[0]+'\')"><span class="ico">'+x[1]+'</span>'+x[2]+'</button>'}).join('')}
function render(){renderNav();fab.style.display=(route==='settings'?'none':'block');if(route==='home')home();else if(route==='transactions')transactions();else if(route==='plan')plan();else if(route==='goals')goals();else settings()}
function home(){var s=safe(),recent=state.transactions.slice().sort(function(a,b){return b.date.localeCompare(a.date)}).slice(0,5);app.innerHTML=top('Your money, clearly','This plan period')+'<div class="hero"><div class="heroLabel">Available to spend</div><div class="heroAmount">'+money(s)+'</div><div class="heroText">After expenses already entered and unpaid bills due during this plan.</div><div class="stats"><div class="stat"><span>Planned income</span><strong>'+money(plannedIncome())+'</strong></div><div class="stat"><span>Spent</span><strong>'+money(expenses())+'</strong></div><div class="stat"><span>Bills reserved</span><strong>'+money(unpaidBills())+'</strong></div></div></div><div class="section"><div class="quick"><button onclick="MW.editIncome()"><span class="qicon">$</span><b>Edit income</b><small>'+money(state.income)+'</small></button><button onclick="MW.addTransaction()"><span class="qicon">＋</span><b>Add transaction</b><small>Income or expense</small></button><button onclick="MW.addBill()"><span class="qicon">⌁</span><b>Add a bill</b><small>'+state.bills.length+' tracked</small></button><button onclick="MW.addGoal()"><span class="qicon">◎</span><b>Add a goal</b><small>'+state.goals.length+' active</small></button></div></div><div class="section"><div class="sectionHead"><h2>Needs, wants and savings</h2><button class="linkBtn" onclick="MW.go(\'plan\')">Edit</button></div><div class="card">'+bucketRow('Needs')+bucketRow('Wants')+bucketRow('Savings')+'</div></div><div class="section"><div class="sectionHead"><h2>Recent activity</h2><button class="linkBtn" onclick="MW.go(\'transactions\')">See all</button></div><div class="card">'+(recent.length?recent.map(txRow).join(''):'<div class="empty">No transactions yet. Tap + to add one.</div>')+'</div></div>'}
function bucketRow(name){var budget=state.categories.filter(function(c){return c.bucket===name}).reduce(function(a,c){return a+Number(c.budget||0)},0),spent=bucketSpent(name);return '<div class="barRow"><div class="barTop"><b>'+name+'</b><span>'+money(spent)+' of '+money(budget)+'</span></div><div class="bar"><i style="width:'+pct(spent,budget)+'%"></i></div></div>'}
function txRow(t){return '<div class="row" onclick="MW.editTransaction(\''+t.id+'\')"><div class="avatar">'+esc(initials(t.merchant))+'</div><div class="main"><b>'+esc(t.merchant)+'</b><small>'+esc(t.date)+' · '+esc(t.category||t.bucket||'Other')+'</small></div><div class="amount '+(t.type==='income'?'income':'')+'">'+(t.type==='income'?'+':'−')+money(t.amount).replace('-','')+'<span class="pill">'+esc(t.bucket||'')+'</span></div></div>'}
function transactions(){var rows=state.transactions.slice().sort(function(a,b){return b.date.localeCompare(a.date)});app.innerHTML=top('Transactions','Everything is editable')+'<div class="toolbar"><input id="search" class="search" placeholder="Search merchant or category" oninput="MW.filterTransactions()"></div><div class="chips"><button class="chip active" data-filter="All" onclick="MW.setFilter(this)">All</button><button class="chip" data-filter="expense" onclick="MW.setFilter(this)">Expenses</button><button class="chip" data-filter="income" onclick="MW.setFilter(this)">Income</button><button class="chip" data-filter="Needs" onclick="MW.setFilter(this)">Needs</button><button class="chip" data-filter="Wants" onclick="MW.setFilter(this)">Wants</button><button class="chip" data-filter="Savings" onclick="MW.setFilter(this)">Savings</button></div><div class="card" id="txList">'+(rows.length?rows.map(txRow).join(''):'<div class="empty">No transactions yet.</div>')+'</div>'}
function plan(){app.innerHTML=top('Your plan','Edit every number')+'<div class="notice">MoneyWise subtracts entered expenses and unpaid bills due this period from your planned income.</div><div class="formCard"><div class="fieldRow"><div><label>Period starts</label><input class="field" id="startDate" type="date" value="'+esc(state.start)+'"></div><div><label>Period ends</label><input class="field" id="endDate" type="date" value="'+esc(state.end)+'"></div></div><div style="margin-top:10px"><button class="btn primary full" onclick="MW.savePeriod()">Save dates</button></div></div><div class="section"><div class="sectionHead"><h2>Categories</h2><button class="linkBtn" onclick="MW.addCategory()">+ Add</button></div>'+state.categories.map(categoryCard).join('')+'</div><div class="section"><div class="sectionHead"><h2>Bills</h2><button class="linkBtn" onclick="MW.addBill()">+ Add</button></div>'+(state.bills.length?state.bills.map(billCard).join(''):'<div class="empty">No bills yet.</div>')+'</div><div class="section"><div class="sectionHead"><h2>Accounts</h2><button class="linkBtn" onclick="MW.addAccount()">+ Add</button></div>'+(state.accounts.length?state.accounts.map(accountCard).join(''):'<div class="empty">No accounts yet.</div>')+'</div>'}
function categoryCard(c){var spent=categorySpent(c.name);return '<div class="itemCard"><div class="itemTop"><div><h3>'+esc(c.name)+'</h3><div class="itemMeta">'+esc(c.bucket)+' · '+money(spent)+' spent</div></div><b>'+money(c.budget)+'</b></div><div class="bar"><i style="width:'+pct(spent,c.budget)+'%"></i></div><div class="itemBtns"><button class="miniBtn" onclick="MW.editCategory(\''+c.id+'\')">Edit</button><button class="miniBtn" onclick="MW.deleteCategory(\''+c.id+'\')">Delete</button></div></div>'}
function billCard(b){return '<div class="itemCard"><div class="itemTop"><div><h3>'+esc(b.name)+'</h3><div class="itemMeta">Due '+esc(b.due)+' · '+(b.paid?'Paid':'Reserved')+'</div></div><b>'+money(b.amount)+'</b></div><div class="itemBtns"><button class="miniBtn" onclick="MW.toggleBill(\''+b.id+'\')">Mark '+(b.paid?'unpaid':'paid')+'</button><button class="miniBtn" onclick="MW.editBill(\''+b.id+'\')">Edit</button><button class="miniBtn" onclick="MW.deleteBill(\''+b.id+'\')">Delete</button></div></div>'}
function accountCard(a){return '<div class="itemCard"><div class="itemTop"><div><h3>'+esc(a.name)+'</h3><div class="itemMeta">'+esc(a.type)+'</div></div><b>'+money(a.balance)+'</b></div><div class="itemBtns"><button class="miniBtn" onclick="MW.editAccount(\''+a.id+'\')">Edit</button><button class="miniBtn" onclick="MW.deleteAccount(\''+a.id+'\')">Delete</button></div></div>'}
function goals(){app.innerHTML=top('Goals','Savings and debt')+'<div class="notice">For debt goals, “current” means the amount you have already paid off.</div>'+(state.goals.length?state.goals.map(goalCard).join(''):'<div class="empty">No goals yet.</div>')}
function goalCard(g){return '<div class="itemCard"><div class="itemTop"><div><h3>'+esc(g.name)+'</h3><div class="itemMeta">'+esc(g.type)+' · '+pct(g.current,g.target)+'% complete</div></div><b>'+money(g.current)+' / '+money(g.target)+'</b></div><div class="bar"><i style="width:'+pct(g.current,g.target)+'%"></i></div><div class="itemBtns"><button class="miniBtn" onclick="MW.editGoal(\''+g.id+'\')">Edit</button><button class="miniBtn" onclick="MW.deleteGoal(\''+g.id+'\')">Delete</button></div></div>'}
function settings(){app.innerHTML=top('Settings','Your data stays on this device')+'<div class="formCard"><div class="toggleRow"><div><b>App name</b><div class="smallText">MoneyWise</div></div><span>✓</span></div><div class="toggleRow"><div><b>Storage</b><div class="smallText">Saved locally in this browser</div></div><span>🔒</span></div></div><div class="formCard"><h3 style="margin-top:0">Backup</h3><p class="smallText">Copy a backup before changing phones or clearing Safari data.</p><div class="actions"><button class="btn secondary" onclick="MW.exportData()">Export backup</button><label class="btn secondary" style="text-align:center"><input id="importFile" type="file" accept="application/json,.json" class="hidden" onchange="MW.importData(this)">Import backup</label></div></div><div class="dangerZone"><b>Start over</b><p class="smallText">Deletes all MoneyWise data saved in this browser.</p><button class="btn danger full" onclick="MW.reset()">Reset MoneyWise</button></div>'}
function open(html){modalBody.innerHTML=html;modal.className='modal show'}
function close(){modal.className='modal'}
modal.addEventListener('click',function(e){if(e.target===modal)close()});
function field(name,label,type,value,extra){return '<div class="formGroup"><label>'+label+'</label><input class="field" name="'+name+'" type="'+type+'" value="'+esc(value)+'" '+(extra||'')+'></div>'}
function select(name,label,values,value){return '<div class="formGroup"><label>'+label+'</label><select class="field" name="'+name+'">'+values.map(function(v){return '<option '+(v===value?'selected':'')+'>'+esc(v)+'</option>'}).join('')+'</select></div>'}
function buttons(del){return '<div class="actions"><button type="button" class="btn secondary" onclick="MW.close()">Cancel</button><button class="btn primary" type="submit">Save</button></div>'+(del||'')}
function editIncome(){open('<h2>Edit planned income</h2><form onsubmit="MW.submitIncome(event)">'+field('income','Planned take-home income','number',state.income,'min="0" step="0.01" required')+buttons('')+'</form>')}
function submitIncome(e){e.preventDefault();state.income=Number(e.target.income.value||0);save();close();render()}
function addTransaction(){editTransaction(null)}
function editTransaction(txid){var t=txid?state.transactions.find(function(x){return x.id===txid}):{id:id(),merchant:'',amount:'',date:iso(),type:'expense',bucket:'Needs',category:state.categories[0]?state.categories[0].name:'Other',account:state.accounts[0]?state.accounts[0].name:'Manual'};open('<h2>'+(txid?'Edit':'Add')+' transaction</h2><form onsubmit="MW.submitTransaction(event,\''+(txid||'')+'\')">'+field('merchant','Merchant or income source','text',t.merchant,'required')+'<div class="fieldRow">'+field('amount','Amount','number',t.amount,'min="0" step="0.01" required')+field('date','Date','date',t.date,'required')+'</div><div class="fieldRow">'+select('type','Type',['expense','income'],t.type)+select('bucket','Bucket',['Needs','Wants','Savings','Income'],t.bucket)+'</div>'+select('category','Category',state.categories.map(function(c){return c.name}).concat(['Income','Other']),t.category)+select('account','Account',state.accounts.map(function(a){return a.name}).concat(['Manual']),t.account)+buttons(txid?'<button type="button" class="btn danger full" style="margin-top:10px" onclick="MW.deleteTransaction(\''+txid+'\')">Delete transaction</button>':'')+'</form>')}
function submitTransaction(e,txid){e.preventDefault();var f=e.target,t={id:txid||id(),merchant:f.merchant.value.trim(),amount:Number(f.amount.value||0),date:f.date.value,type:f.type.value,bucket:f.type.value==='income'?'Income':f.bucket.value,category:f.type.value==='income'?'Income':f.category.value,account:f.account.value};if(txid){var i=state.transactions.findIndex(function(x){return x.id===txid});state.transactions[i]=t}else state.transactions.push(t);save();close();render()}
function deleteTransaction(x){if(!confirm('Delete this transaction?'))return;state.transactions=state.transactions.filter(function(t){return t.id!==x});save();close();render()}
function editCategory(cid){var c=cid?state.categories.find(function(x){return x.id===cid}):{id:id(),name:'',bucket:'Wants',budget:''};open('<h2>'+(cid?'Edit':'Add')+' category</h2><form onsubmit="MW.submitCategory(event,\''+(cid||'')+'\')">'+field('name','Category name','text',c.name,'required')+'<div class="fieldRow">'+select('bucket','Bucket',['Needs','Wants','Savings'],c.bucket)+field('budget','Budget','number',c.budget,'min="0" step="0.01" required')+'</div>'+buttons('')+'</form>')}
function submitCategory(e,cid){e.preventDefault();var f=e.target,c={id:cid||id(),name:f.name.value.trim(),bucket:f.bucket.value,budget:Number(f.budget.value||0)};if(cid){var i=state.categories.findIndex(function(x){return x.id===cid});state.categories[i]=c}else state.categories.push(c);save();close();render()}
function deleteCategory(x){if(!confirm('Delete this category? Existing transactions will stay.'))return;state.categories=state.categories.filter(function(c){return c.id!==x});save();render()}
function editBill(bid){var b=bid?state.bills.find(function(x){return x.id===bid}):{id:id(),name:'',amount:'',due:iso(),paid:false};open('<h2>'+(bid?'Edit':'Add')+' bill</h2><form onsubmit="MW.submitBill(event,\''+(bid||'')+'\')">'+field('name','Bill name','text',b.name,'required')+'<div class="fieldRow">'+field('amount','Amount','number',b.amount,'min="0" step="0.01" required')+field('due','Due date','date',b.due,'required')+'</div>'+select('paid','Status',['Unpaid','Paid'],b.paid?'Paid':'Unpaid')+buttons('')+'</form>')}
function submitBill(e,bid){e.preventDefault();var f=e.target,b={id:bid||id(),name:f.name.value.trim(),amount:Number(f.amount.value||0),due:f.due.value,paid:f.paid.value==='Paid'};if(bid){var i=state.bills.findIndex(function(x){return x.id===bid});state.bills[i]=b}else state.bills.push(b);save();close();render()}
function toggleBill(x){var b=state.bills.find(function(y){return y.id===x});b.paid=!b.paid;save();render()}
function deleteBill(x){if(!confirm('Delete this bill?'))return;state.bills=state.bills.filter(function(b){return b.id!==x});save();render()}
function editAccount(aid){var a=aid?state.accounts.find(function(x){return x.id===aid}):{id:id(),name:'',type:'Checking',balance:''};open('<h2>'+(aid?'Edit':'Add')+' account</h2><form onsubmit="MW.submitAccount(event,\''+(aid||'')+'\')">'+field('name','Account name','text',a.name,'required')+'<div class="fieldRow">'+select('type','Type',['Checking','Savings','Credit Card','Cash','Investment'],a.type)+field('balance','Balance','number',a.balance,'step="0.01" required')+'</div>'+buttons('')+'</form>')}
function submitAccount(e,aid){e.preventDefault();var f=e.target,a={id:aid||id(),name:f.name.value.trim(),type:f.type.value,balance:Number(f.balance.value||0)};if(aid){var i=state.accounts.findIndex(function(x){return x.id===aid});state.accounts[i]=a}else state.accounts.push(a);save();close();render()}
function deleteAccount(x){if(!confirm('Delete this account?'))return;state.accounts=state.accounts.filter(function(a){return a.id!==x});save();render()}
function editGoal(gid){var g=gid?state.goals.find(function(x){return x.id===gid}):{id:id(),name:'',type:'Savings',target:'',current:''};open('<h2>'+(gid?'Edit':'Add')+' goal</h2><form onsubmit="MW.submitGoal(event,\''+(gid||'')+'\')">'+field('name','Goal name','text',g.name,'required')+select('type','Type',['Savings','Debt'],g.type)+'<div class="fieldRow">'+field('target','Target','number',g.target,'min="0" step="0.01" required')+field('current','Completed so far','number',g.current,'min="0" step="0.01" required')+'</div>'+buttons('')+'</form>')}
function submitGoal(e,gid){e.preventDefault();var f=e.target,g={id:gid||id(),name:f.name.value.trim(),type:f.type.value,target:Number(f.target.value||0),current:Number(f.current.value||0)};if(gid){var i=state.goals.findIndex(function(x){return x.id===gid});state.goals[i]=g}else state.goals.push(g);save();close();render()}
function deleteGoal(x){if(!confirm('Delete this goal?'))return;state.goals=state.goals.filter(function(g){return g.id!==x});save();render()}
function savePeriod(){var a=document.getElementById('startDate').value,b=document.getElementById('endDate').value;if(!a||!b||a>b){toast('Check the plan dates');return}state.start=a;state.end=b;save();render()}
function filterTransactions(){var q=document.getElementById('search').value.toLowerCase(),active=document.querySelector('.chip.active'),f=active?active.getAttribute('data-filter'):'All',rows=state.transactions.slice().sort(function(a,b){return b.date.localeCompare(a.date)}).filter(function(t){var ok=f==='All'||t.type===f||t.bucket===f;var text=(t.merchant+' '+t.category+' '+t.bucket).toLowerCase();return ok&&text.indexOf(q)>-1});document.getElementById('txList').innerHTML=rows.length?rows.map(txRow).join(''):'<div class="empty">Nothing matches.</div>'}
function setFilter(el){Array.prototype.forEach.call(document.querySelectorAll('.chip'),function(x){x.classList.remove('active')});el.classList.add('active');filterTransactions()}
function exportData(){var blob=new Blob([JSON.stringify(state,null,2)],{type:'application/json'}),a=document.createElement('a');a.href=URL.createObjectURL(blob);a.download='MoneyWise-backup.json';a.click();setTimeout(function(){URL.revokeObjectURL(a.href)},1000)}
function importData(inp){var file=inp.files&&inp.files[0];if(!file)return;var r=new FileReader();r.onload=function(){try{var x=JSON.parse(r.result);if(!x.transactions||!x.categories)throw new Error();state=x;save();render();toast('Backup imported')}catch(e){toast('That backup could not be read')}};r.readAsText(file)}
function reset(){if(!confirm('Delete everything and restore the starter plan?'))return;state=starter();save();route='home';render()}
fab.onclick=function(){if(route==='goals')editGoal(null);else if(route==='plan')editCategory(null);else editTransaction(null)};
window.MW={go:function(r){route=r;close();render();scrollTo(0,0)},openSettings:function(){route='settings';render()},close:close,editIncome:editIncome,submitIncome:submitIncome,addTransaction:addTransaction,editTransaction:editTransaction,submitTransaction:submitTransaction,deleteTransaction:deleteTransaction,addCategory:function(){editCategory(null)},editCategory:editCategory,submitCategory:submitCategory,deleteCategory:deleteCategory,addBill:function(){editBill(null)},editBill:editBill,submitBill:submitBill,toggleBill:toggleBill,deleteBill:deleteBill,addAccount:function(){editAccount(null)},editAccount:editAccount,submitAccount:submitAccount,deleteAccount:deleteAccount,addGoal:function(){editGoal(null)},editGoal:editGoal,submitGoal:submitGoal,deleteGoal:deleteGoal,savePeriod:savePeriod,filterTransactions:filterTransactions,setFilter:setFilter,exportData:exportData,importData:importData,reset:reset};
render();
})();
